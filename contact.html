<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <title>Courses - SoundAMP</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <div class="container">

            <!-- Logo -->
            <a href="index.html" class="logo-wrapper">
                <img src="Images/bestguitar.png" alt="Logo">
                <h1 class="title">SoundAMP</h1>
            </a>

            <!-- Hamburger menu -->
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Navigatie -->
            <nav class="nav" id="navMenu">
                <a href="events.html">Events</a>
                <a href="courses.html">Courses</a>
                <a href="contact.html">Contact</a>
                <br>
            </nav>
        </div>
    </header>


    <main class="content">
        <h2>Contact Us!</h2>

        <div class="contact">
            <form action="/submit-form.php" method="POST">

                <label for="fname">Name</label>
                <input type="text" id="fname" name="firstname" placeholder="Your name.." required>

                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Your e-mail.." required>

                <label for="subject">Message</label>
                <textarea id="subject" name="subject" placeholder="Your message.." style="height:150px"></textarea>

                <input type="submit" value="Send">
            </form>
        </div>
    </main>

    <!-- ======================
         SCRIPTS
    ====================== -->
    <script src="script.js"></script>
    <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>

    <!-- Hamburger menu toggle -->
    <script>
        const toggle = document.querySelector(".menu-toggle");
        const nav = document.querySelector(".nav");

        toggle.addEventListener("click", () => {
            nav.classList.toggle("active");
            toggle.classList.toggle("active");
        });
    </script>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <h3>SoundAMP</h3>
                <p>The ultimate music experience</p>
            </div>

            <div class="footer-right">
                <h4>Follow us</h4>
                <div class="social-icons">
                    <a href="https://facebook.com" target="_blank" class="fa-brands fa-facebook-f"></a>
                    <a href="https://instagram.com" target="_blank" class="fa-brands fa-instagram"></a>
                    <a href="https://x.com" target="_blank" class="fa-brands fa-x-twitter"></a>
                </div>
            </div>
        </div>
        <p class="footer-bottom">© 2026 SoundAMP. All rights reserved.</p>
    </footer>
</body>

</html>
