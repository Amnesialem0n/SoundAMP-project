<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/flickity@2/dist/flickity.min.css">
    <title>SoundAMP</title>
</head>

<body>
    <!-- ======================
         HEADER
    ====================== -->
    <header class="header">
        <div class="container">

            <!-- Logo -->
            <a href="index.html" class="logo-wrapper">
                <img src="Images/bestguitar.png" alt="Logo">
                <h1 class="title">SoundAMP</h1>
            </a>

            <!-- Hamburger menu -->
            <div class="menu-toggle" onclick="toggleMenu()">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- Navigatie -->
            <nav class="nav" id="navMenu">
                <a href="Events.html">Events</a>
                <a href="courses.html">Courses</a>
                <a href="contact.html">Contact</a>
                <br>
            </nav>
            <br>
        </div>
    </header>

    <!-- ======================
         CONTENT
    ====================== -->
    <div class="content">

        <!-- Banner / Hero -->
        <section class="banner">
            <img src="Images/bannerstage.jpg" alt="">
            <div class="hero-text">
                <h1>Feel The Sound</h1>
                <p>The ultimate music experience</p>
                <br>
                <button>Buy Tickets</button>
            </div>
        </section>

        <!-- Gallery -->
        <h2>Impressions</h2>
        <div class="gallery js-flickity" data-flickity-options='{ "wrapAround": true }'>
            <div class="gallery-cell"><img src="Images/lightning.jpg" alt=""></div>
            <div class="gallery-cell"><img src="Images/singer.jpg" alt=""></div>
            <div class="gallery-cell"><img src="Images/stage.jpg" alt=""></div>
            <div class="gallery-cell"><img src="Images/stage2.jpg" alt=""></div>
            <div class="gallery-cell"><img src="Images/drummer.jpg" alt=""></div>
        </div>
    </div>

    <!-- ======================
         SCRIPTS
    ====================== -->
    <script src="script.js"></script>
    <script src="https://unpkg.com/flickity@2/dist/flickity.pkgd.min.js"></script>

    <!-- Hamburger menu toggle -->
    <script>
        const toggle = document.querySelector(".menu-toggle");
        const nav = document.querySelector(".nav");

        toggle.addEventListener("click", () => {
            nav.classList.toggle("active");
            toggle.classList.toggle("active");
        });
    </script>

    <footer>
        <div class="footer-container">
            <div class="footer-left">
                <h3>SoundAMP</h3>
                <p>The ultimate music experience</p>
            </div>

            <div class="footer-right">
                <h4>Follow us</h4>
                <div class="social-icons">
                    <a href="https://facebook.com" target="_blank" class="fa-brands fa-facebook-f"></a>
                    <a href="https://instagram.com" target="_blank" class="fa-brands fa-instagram"></a>
                    <a href="https://x.com" target="_blank" class="fa-brands fa-x-twitter"></a>
                </div>
            </div>
        </div>
        <p class="footer-bottom">© 2026 SoundAMP. All rights reserved.</p>
    </footer>

</body>

</html>
